name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci
        # postinstall automatically runs scripts/copy-stockfish.mjs
        # which copies the WASM files from node_modules into public/stockfish/

      - name: Build
        run: npm run build
        env:
          # Sets Vite's base path to /repo-name/ so asset URLs work on GitHub Pages
          VITE_BASE_URL: /${{ github.event.repository.name }}/

      - name: Configure Pages
        uses: actions/configure-pages@v4
        with:
          # Automatically enables GitHub Pages with Actions source if not already set
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
